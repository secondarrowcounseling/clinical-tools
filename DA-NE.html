<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal and Noise: Dopamine & Norepinephrine Simulator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .simulator-container {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 800px;
            width: 100%;
        }
        h2 {
            margin-top: 0;
            color: #4da6ff;
            text-align: center;
            margin-bottom: 20px;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #444;
            margin-bottom: 20px;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .control-group {
            background: #333;
            padding: 15px;
            border-radius: 8px;
        }
        .control-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        .profiles {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            background-color: #4da6ff;
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #3388dd;
        }
        .status-box {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #4da6ff;
            font-size: 0.95em;
            line-height: 1.5;
        }
        
        /* Highlight colors for specific neurotransmitters */
        .da-label { color: #ff6b6b; }
        .ne-label { color: #4dd2ff; }
    </style>
</head>
<body>

<div class="simulator-container">
    <h2>The "Signal & Noise" Tuner</h2>
    
    <div class="profiles">
        <button onclick="setProfile('neurotypical')">Neurotypical (Optimal)</button>
        <button onclick="setProfile('adhd')">ADHD (Under-aroused)</button>
        <button onclick="setProfile('audhd')">AuDHD (Overstimulated)</button>
    </div>

    <div class="canvas-container">
        <canvas id="tunerCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label class="da-label">Dopamine (Signal Clarity): <span id="daValue">50</span></label>
            <input type="range" id="daSlider" min="0" max="100" value="50" oninput="updateManual()">
        </div>
        <div class="control-group">
            <label class="ne-label">Norepinephrine (Arousal/Noise): <span id="neValue">50</span></label>
            <input type="range" id="neSlider" min="0" max="100" value="50" oninput="updateManual()">
        </div>
    </div>

    <div class="status-box" id="statusText">
        Adjust the dials to manually tune the neurotransmitter balance, or select a profile above to see how structural differences affect perception.
    </div>
</div>

<script>
    const canvas = document.getElementById('tunerCanvas');
    const ctx = canvas.getContext('2d');
    const daSlider = document.getElementById('daSlider');
    const neSlider = document.getElementById('neSlider');
    const daValueLabel = document.getElementById('daValue');
    const neValueLabel = document.getElementById('neValue');
    const statusText = document.getElementById('statusText');

    // Make canvas resize correctly
    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Particle System (The "Noise")
    const particles = [];
    const numParticles = 150;

    for (let i = 0; i < numParticles; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 2,
            vy: (Math.random() - 0.5) * 2,
            size: Math.random() * 3 + 1
        });
    }

    // Profiles Configuration
    const profiles = {
        neurotypical: {
            da: 75,
            ne: 55,
            text: "<strong>Neurotypical (Optimal):</strong> Signal is clear, background noise is suppressed. The brain has enough Dopamine to lock onto the target and just enough Norepinephrine to maintain energy without amplifying background static."
        },
        adhd: {
            da: 80,
            ne: 15,
            text: "<strong>ADHD (Under-aroused):</strong> High intention (Dopamine) but low activation energy (Norepinephrine). The signal is there, but the brain lacks the systemic arousal to execute it. The target is lost in a thick, lethargic brain fog."
        },
        audhd: {
            da: 25,
            ne: 90,
            text: "<strong>AuDHD (Overstimulated):</strong> Low task signal (Dopamine) overwhelmed by hyper-arousal (Norepinephrine). The background static becomes deafening, and the brain frantically processes every irrelevant detail at maximum volume."
        }
    };

    function setProfile(profileName) {
        const p = profiles[profileName];
        daSlider.value = p.da;
        neSlider.value = p.ne;
        daValueLabel.innerText = p.da;
        neValueLabel.innerText = p.ne;
        statusText.innerHTML = p.text;
    }

    function updateManual() {
        daValueLabel.innerText = daSlider.value;
        neValueLabel.innerText = neSlider.value;
        statusText.innerHTML = "<strong>Manual Tuning:</strong> You are manually adjusting the chemical balance. Notice how dropping NE creates fog, while cranking it creates frantic static.";
    }

    // Main Render Loop
    function draw() {
        // Read current slider states
        const da = parseInt(daSlider.value);
        const ne = parseInt(neSlider.value);

        // Calculate Physics based on NE
        // Low NE = slow, High NE = frantic
        let speedMultiplier = 1;
        let noiseOpacity = 0.5;
        let fogOpacity = 0;
        let jitter = 0;

        if (ne < 35) {
            // Under-aroused
            speedMultiplier = ne / 35; // Slows down to near 0
            fogOpacity = 1 - (ne / 35); // Max fog at 0
            noiseOpacity = 0.2;
        } else if (ne <= 65) {
            // Goldilocks zone
            speedMultiplier = 1;
            noiseOpacity = 0.15; // Gentle background noise
        } else {
            // Over-aroused / Hyper-vigilant
            speedMultiplier = 1 + ((ne - 65) / 35) * 4; // Speeds up significantly
            noiseOpacity = 0.15 + ((ne - 65) / 35) * 0.85; // Becomes very visible
            jitter = ((ne - 65) / 35) * 5; // Screen shake effect
        }

        // Clear canvas
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Apply Jitter (Hyper-arousal simulation)
        const jx = (Math.random() - 0.5) * jitter;
        const jy = (Math.random() - 0.5) * jitter;
        ctx.save();
        ctx.translate(jx, jy);

        // Draw Particles (Norepinephrine Noise)
        ctx.fillStyle = `rgba(150, 200, 255, ${noiseOpacity})`;
        particles.forEach(p => {
            p.x += p.vx * speedMultiplier;
            p.y += p.vy * speedMultiplier;

            // Wrap around edges
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });

        // Draw Target Signal (Dopamine Focus)
        // High DA = clear, large signal. Low DA = transparent, small signal.
        const signalOpacity = da / 100;
        const signalSize = 40 + (da / 100) * 40;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        ctx.fillStyle = `rgba(255, 107, 107, ${signalOpacity})`;
        ctx.shadowBlur = 20 * signalOpacity;
        ctx.shadowColor = '#ff6b6b';
        
        ctx.beginPath();
        ctx.arc(centerX, centerY, signalSize, 0, Math.PI * 2);
        ctx.fill();

        // Inner core of the signal
        ctx.fillStyle = `rgba(255, 255, 255, ${signalOpacity})`;
        ctx.beginPath();
        ctx.arc(centerX, centerY, signalSize * 0.3, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.shadowBlur = 0; // reset shadow

        ctx.restore(); // remove jitter translation

        // Draw Fog Overlay (Low Norepinephrine / Under-arousal)
        if (fogOpacity > 0) {
            ctx.fillStyle = `rgba(20, 20, 25, ${fogOpacity * 0.85})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        requestAnimationFrame(draw);
    }

    // Start the animation loop
    draw();
</script>

</body>
</html>
