<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Second Arrow Cockpit</title>
    <!-- Tailwind CSS for clean layout utilities -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React 18 & Babel for a native, unminified, highly editable browser experience -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #faf8f5; /* warmWhite */
            margin: 0;
            line-height: inherit;
        }
        /* Custom scrollbars matching the color palette */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #F5F3EF; /* cream */
        }
        ::-webkit-scrollbar-thumb {
            background: #bdb7a2; /* stone */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6d7873; /* warmGrey */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const m = {
            forest: "#45735d",
            gold: "#ba945e",
            terracotta: "#b68d76",
            darkForest: "#35361c",
            warmWhite: "#faf8f5",
            cream: "#F5F3EF",
            stone: "#bdb7a2",
            warmGrey: "#6d7873",
            coolGrey: "#a6aea6",
            iceBlue: "#8cbdb5",
            calmTeal: "#5a9e8a"
        };

        const initialClients = [
            { id: "client_a", name: "Client A (Tier 1)", weight: 1.0 },
            { id: "client_b", name: "Client B (Tier 2)", weight: 2.0 },
            { id: "client_c", name: "Client C (Tier 3)", weight: 3.0 }
        ];

        const cyclePhases = [
            { id: "follicular", label: "Follicular", modifier: 0.5, desc: "Resilient" },
            { id: "ovulatory", label: "Ovulatory", modifier: 0.5, desc: "Peak" },
            { id: "luteal", label: "Luteal", modifier: 1.5, desc: "Protect" },
            { id: "menstrual", label: "Menstrual", modifier: 1.2, desc: "Reset" }
        ];

        const energyStealersConfig = [
            { id: "tight_9am", label: "9:00 AM Session Start" },
            { id: "solo_parenting", label: "Solo Parenting (Morning)" },
            { id: "medical_appt", label: "Personal Medical Appt" },
            { id: "high_endocrine", label: "High Endocrine Load" }
        ];

        const morningChecklistTasks = [
            "Create Meet links for clients",
            "Update host settings",
            "Review clinical notes",
            "Respond/note any emails/texts/calls"
        ];

        const shutdownChecklistTasks = [
            "Complete progress notes",
            "Update Headway calendar",
            "Run IVY Pay if needed",
            "Respond to emails/texts/calls"
        ];

        const defaultState = {
            mode: "workday",
            page: 1,
            cyclePhase: "luteal",
            symptoms: {
                pain: false,
                sleep: false,
                sensory: false,
                fog: false,
                bleeding: false
            },
            energyStealers: ["tight_9am"],
            morningDropoff: "smooth",
            eveningPlan: "cook",
            coreFocus: "",
            morningChecklist: [false, false, false, false],
            avs: 5,
            utilization: 3,
            sessions: [
                { time: "09:00 AM", clientId: "", ghost: false, noteWritten: false, intensity: "standard" },
                { time: "10:15 AM", clientId: "", ghost: false, noteWritten: false, intensity: "standard" },
                { time: "11:30 AM", clientId: "", ghost: false, noteWritten: false, intensity: "standard" },
                { time: "01:00 PM", clientId: "", ghost: false, noteWritten: false, intensity: "standard" },
                { time: "02:15 PM", clientId: "", ghost: false, noteWritten: false, intensity: "standard" }
            ],
            shutdownChecklist: [false, false, false, false],
            capsule: {
                media: "",
                hyperfocus: "",
                dayAnchor: "",
                currentBook: "",
                activeCourse: "",
                mediaEnabled: true,
                hyperfocusEnabled: true,
                dayAnchorEnabled: true,
                readEnabled: true,
                courseEnabled: true,
                photoAnchor: ""
            },
            clients: initialClients,
            scratchpadNotes: "",
            weekendDebtCarryover: false
        };

        const Icons = {
            Activity: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>
            ),
            Calendar: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/></svg>
            ),
            Check: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
            ),
            ChevronLeft: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            ),
            ChevronRight: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            ),
            CircleCheck: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
            ),
            Circle: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/></svg>
            ),
            Copy: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
            ),
            FileText: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
            ),
            Ghost: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 10h.01"/><path d="M15 10h.01"/><path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5 2.5-2.5 2.5 2.5 2.5-2.5 3 3V10a8 8 0 0 0-8-8z"/></svg>
            ),
            Moon: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            ),
            RotateCcw: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            ),
            Sun: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            ),
            Thermometer: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>
            ),
            TriangleAlert: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            ),
            Plus: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            ),
            Trash2: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            ),
            Zap: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            ),
            Heart: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            ),
            BookOpen: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            ),
            Camera: ({ size = 16, color = "currentColor" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z"/><circle cx="12" cy="13" r="3"/></svg>
            )
        };

        function getAVSFeedback(avs) {
            if (avs <= 2) {
                return { color: m.iceBlue, label: "Vagal Collapse / Freeze State", sub: "Complete energetic depletion, hypo-arousal, or executive shutdown. Cease administrative output. Passive sensory restoration required." };
            } else if (avs <= 4) {
                return { color: m.calmTeal, label: "Parasympathetic Restoration", sub: "Autonomic safety, physiological recovery, and active decompression." };
            } else if (avs <= 6) {
                return { color: m.forest, label: "Ventral Vagal Flow State", sub: "The optimal baseline sweet spot. High empathy retention, fluid communication, and balanced focus." };
            } else if (avs <= 8) {
                return { color: m.gold, label: "Sympathetic Mobilization", sub: "Rising cognitive friction, sensory hyper-awareness, or low-level anxiety. Enforce transition recovery timers." };
            } else {
                return { color: m.terracotta, label: "Sympathetic Overdrive / Autonomic Conflict", sub: "Fight/flight activation, high sensory fatigue, or acute neurodivergent burnout. Trigger automatic professional lockout, mandating strict sensory isolation." };
            }
        }

        function getUtilFeedback(level) {
            const labels = ["Underloaded", "Buffer", "Sweet Spot", "Max Capacity", "Overload"];
            const colors = [m.stone, m.forest, m.gold, m.terracotta, m.darkForest];
            return {
                label: labels[level - 1] || "Unknown",
                color: colors[level - 1] || m.stone
            };
        }

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorMsg: "" };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, errorMsg: String(error) };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: 40, color: m.terracotta, fontFamily: "system-ui, sans-serif" }}>
                            <h2 style={{ color: m.darkForest }}>Cockpit Render Error</h2>
                            <pre style={{ background: m.cream, padding: 16, borderRadius: 8, overflow: "auto" }}>{this.state.errorMsg}</pre>
                            <p style={{ marginTop: 12, color: m.warmGrey }}>Try resetting local state or clear localStorage.</p>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        function App() {
            const [state, setState] = React.useState(() => {
                try {
                    const saved = localStorage.getItem("cockpit-v2");
                    if (saved) {
                        return { ...defaultState, ...JSON.parse(saved) };
                    }
                } catch (e) {
                    console.error("Local load failed", e);
                }
                return defaultState;
            });

            React.useEffect(() => {
                try {
                    localStorage.setItem("cockpit-v2", JSON.stringify(state));
                } catch (e) {
                    console.error("Local save failed", e);
                }
            }, [state]);

            const updateState = (update) => setState(prev => ({ ...prev, ...update }));

            const updateSession = (idx, update) => setState(prev => {
                const sessions = prev.sessions.map((s, sIdx) => sIdx === idx ? { ...s, ...update } : s);
                return { ...prev, sessions };
            });

            const updateCapsule = (update) => setState(prev => ({
                ...prev,
                capsule: { ...prev.capsule, ...update }
            }));

            const toggleSymptom = (key) => setState(prev => ({
                ...prev,
                symptoms: { ...prev.symptoms, [key]: !prev.symptoms[key] }
            }));

            // Automated Endocrine Load scoring logic based on symptom checklist tally
            const activeSymptomCount = [
                state.symptoms.pain,
                state.symptoms.sleep,
                state.symptoms.sensory,
                state.symptoms.fog,
                state.symptoms.bleeding
            ].filter(Boolean).length;

            const computedEndocrineLoad = activeSymptomCount === 0 ? 1.0 : activeSymptomCount <= 2 ? 2.0 : 3.0;

            // Endocrine Calculations
            const endocrinePhaseMod = (cyclePhases.find(p => p.id === state.cyclePhase) || cyclePhases[0]).modifier;
            const dragCoefficient = endocrinePhaseMod * computedEndocrineLoad;

            // Dynamic CCF Target calculation (Somatic Safeguard Override)
            let standardCeiling = 10.0;
            let dynamicCeiling = standardCeiling;
            if (state.energyStealers.includes("solo_parenting")) {
                dynamicCeiling -= 1.5;
            }
            if (dragCoefficient >= 3.0) {
                dynamicCeiling = Math.min(dynamicCeiling, 8.0);
            }
            dynamicCeiling = Math.max(6.0, dynamicCeiling);

            // Live CCF Cumulative Sum
            const ccfLoad = state.sessions.reduce((sum, s) => {
                if (s.ghost || !s.clientId) return sum;
                const client = state.clients.find(c => c.id === s.clientId);
                if (!client) return sum;
                const multiplier = s.intensity === "elevated" ? 1.3 : s.intensity === "crisis" ? 1.6 : 1.0;
                return sum + (client.weight * multiplier);
            }, 0);

            const ccfPercentage = Math.min(100, dynamicCeiling > 0 ? (ccfLoad / dynamicCeiling) * 100 : 0);
            const ccfColor = ccfLoad > dynamicCeiling ? m.terracotta : ccfLoad > (dynamicCeiling * 0.85) ? m.gold : m.forest;

            // Back-to-Back High Intensity Clinical Safeguard warning
            const consecutiveHighRisk = React.useMemo(() => {
                let lastIntensity = false;
                for (let s of state.sessions) {
                    if (s.ghost || !s.clientId) {
                        lastIntensity = false;
                        continue;
                    }
                    const client = state.clients.find(c => c.id === s.clientId);
                    if (client) {
                        const weight = client.weight * (s.intensity === "elevated" ? 1.3 : s.intensity === "crisis" ? 1.6 : 1.0);
                        if (weight >= 2.5) {
                            if (lastIntensity) return true;
                            lastIntensity = true;
                        } else {
                            lastIntensity = false;
                        }
                    }
                }
                return false;
            }, [state.sessions, state.clients]);

            const avsFeedback = getAVSFeedback(state.avs || 5);
            const utilFeedback = getUtilFeedback(state.utilization || 3);
            const unwrittenNotesCount = state.sessions.filter(s => s.clientId && !s.ghost && !s.noteWritten).length;

            const [newClientName, setNewClientName] = React.useState("");
            const [newClientWeight, setNewClientWeight] = React.useState(2);
            const [rosterExpanded, setRosterExpanded] = React.useState(false);

            const addClient = () => {
                if (!newClientName.trim()) return;
                const newId = `client_${Date.now()}`;
                const added = { id: newId, name: `${newClientName.trim()} (Tier ${newClientWeight})`, weight: Number(newClientWeight) };
                updateState({ clients: [...state.clients, added] });
                setNewClientName("");
            };

            const removeClient = (clientId) => {
                const filtered = state.clients.filter(c => c.id !== clientId);
                const cleanedSessions = state.sessions.map(s => s.clientId === clientId ? { ...s, clientId: "" } : s);
                updateState({ clients: filtered, sessions: cleanedSessions });
            };

            // Compiled RAG-Optimized YAML markdown output with fallback support
            const compiledMarkdown = React.useMemo(() => {
                const today = new Date().toISOString().split("T")[0];
                const escapeQuotes = str => (str || "").replace(/"/g, '\\"');
                
                // Intentional Fallback assignments
                const nowSpinningVal = state.capsule.mediaEnabled ? escapeQuotes(state.capsule.media || "") : "intentional_silence";
                const currentHyperfocusVal = state.capsule.hyperfocusEnabled ? escapeQuotes(state.capsule.hyperfocus || "") : "cognitive_rest";
                const currentBookVal = state.capsule.readEnabled ? escapeQuotes(state.capsule.currentBook || "") : "cognitive_rest";
                const activeCourseVal = state.capsule.courseEnabled ? escapeQuotes(state.capsule.activeCourse || "") : "cognitive_rest";
                const dailyEventVal = state.capsule.dayAnchorEnabled ? escapeQuotes(state.capsule.dayAnchor || "") : "standard_routine_day";

                return [
                    "---",
                    `date: ${today}`,
                    `weekend_mode: ${state.mode === "weekend"}`,
                    `cycle_phase: ${state.cyclePhase}`,
                    `endocrine_load: ${computedEndocrineLoad}`,
                    `somatic_drag_coefficient: ${dragCoefficient.toFixed(1)}`,
                    `autonomic_variance_score: ${state.avs}`,
                    `morning_focus: "${escapeQuotes(state.coreFocus || "")}"`,
                    "energy_stealers:",
                    ...(state.energyStealers || []).map(s => `  - ${s}`),
                    "logged_somatic_symptoms:",
                    ...(Object.keys(state.symptoms).filter(k => state.symptoms[k]).map(k => `  - ${k}`)),
                    "family_household:",
                    `  morning_dropoff: "${state.morningDropoff}"`,
                    `  evening_energy_plan: "${state.eveningPlan}"`,
                    `sessions_scheduled: ${state.sessions.filter(s => s.clientId && !s.ghost).length}`,
                    `sessions_completed: ${state.sessions.filter(s => s.clientId && !s.ghost).length}`,
                    `ghost_sessions: ${state.sessions.filter(s => s.ghost).length}`,
                    `caseload_complexity_factor: ${ccfLoad.toFixed(1)}`,
                    `max_daily_ccf_threshold: ${dynamicCeiling.toFixed(1)}`,
                    `notes_written_today: ${state.sessions.filter(s => s.noteWritten).length}`,
                    `notes_remaining_debt: ${unwrittenNotesCount}`,
                    `workday_completed: ${state.shutdownChecklist.every(Boolean)}`,
                    `now_spinning: "${nowSpinningVal}"`,
                    `current_hyperfocus: "${currentHyperfocusVal}"`,
                    `current_book: "${currentBookVal}"`,
                    `active_course: "${activeCourseVal}"`,
                    `daily_event: "${dailyEventVal}"`,
                    "---",
                    "",
                    `**[#${today}-Somatic-Log]**`,
                    `*   **Somatic Status:** Endocrine load auto-tallied at **${computedEndocrineLoad.toFixed(1)}** (${activeSymptomCount} symptoms). True biological drag coefficient calculated at **${dragCoefficient.toFixed(1)}** with an Autonomic Variance Score of **${state.avs}/10**. ${dragCoefficient >= 3.0 ? "Luteal sensory override safeguard active." : "Operating inside normal somatic load margins."}`,
                    `*   **Intellectual & Temporal Artifacts:** Anchored today's timeline via **"${state.capsule.dayAnchorEnabled && state.capsule.dayAnchor ? escapeQuotes(state.capsule.dayAnchor) : "standard_routine_day"}"**. Active hyperfocus captured under **"${currentHyperfocusVal}"**.`
                ].join("\n");
            }, [state, dragCoefficient, computedEndocrineLoad, activeSymptomCount, ccfLoad, dynamicCeiling, unwrittenNotesCount]);

            const [copied, setCopied] = React.useState(false);
            const handleCopy = () => {
                try {
                    const el = document.createElement('textarea');
                    el.value = compiledMarkdown;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (e) {
                    console.error("Copy block failed", e);
                }
            };

            const toggleEnergyStealer = (id) => {
                const stealers = new Set(state.energyStealers || []);
                if (stealers.has(id)) stealers.delete(id);
                else stealers.add(id);
                updateState({ energyStealers: Array.from(stealers) });
            };

            const toggleMorningTask = (idx) => {
                const morningChecklist = [...state.morningChecklist];

            };

                    {/* DYNAMIC CONTEXTUAL BANNER ALERTS */}
                    <div style={{ maxWidth: 720, margin: "16px auto 0", padding: "0 16px" }}>
                        {consecutiveHighRisk && state.mode === "workday" && (
                            <div style={{ padding: "12px 16px", borderRadius: 8, backgroundColor: "rgba(182, 141, 118, 0.15)", color: m.terracotta, border: `1px solid ${m.terracotta}`, display: "flex", alignItems: "center", gap: 10, fontSize: 13, marginBottom: 12 }}>

                                    <strong style={{ fontStyle: "normal", fontWeight: 600 }}>Somatic Boundary Alert:</strong> Back-to-Back high complexity clinical sessions detected (Tier 3 or crisis modifiers). Mandating a 15-minute sensory isolation recovery window.

                        {unwrittenNotesCount > 0 && state.mode === "workday" && state.shutdownChecklist.every(Boolean) && !state.weekendDebtCarryover && (

                                    <Icons.TriangleAlert size={18} color={m.gold} />
                                    <div>
                                        <strong style={{ fontStyle: "normal", fontWeight: 600 }}>Friday Safeguard Prompt:</strong> You have {unwrittenNotesCount} pending notes. To safely seal your afternoon airlock with unresolved documentation debt, you must validate weekend carryover.

                                </div>
                                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", marginTop: 4, padding: "4px 8px", backgroundColor: "rgba(255,255,255,0.4)", borderRadius: 4 }}>

                    {/* LAUNCHPAD (PAGE 1) */}
                    {state.page === 1 && (
                        <main style={{ maxWidth: 720, margin: "0 auto", padding: "24px 16px 100px" }}>
                            
                            {/* AUTOMATED ENDOCRINE WEATHER STATION */}

                                        <p style={{ margin: "2px 0 0", fontSize: 12, color: m.warmGrey }}>
                                            {dragCoefficient >= 3 ? "Luteal sensory safeguard active: daily CCF ceiling limited." : "Somatic load remains within manageable margins."}
                                        </p>
                                    </div>
                                </div>
                                {dynamicCeiling < standardCeiling && (

                                        {dragCoefficient >= 3 && " (endocrine drag compensation)"}

                                )}
                            </section>

                            {/* ENERGY STEALERS AUDIT */}
                            <section style={{ ...cardStyle, marginBottom: 20 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                                    <Icons.Zap size={20} color={m.gold} />
                                    <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: 0 }}>Energy Stealers Audit</h2>
                                </div>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                                    {energyStealersConfig.map(s => {

                                            <button
                                                key={s.id}
                                                onClick={() => toggleEnergyStealer(s.id)}
                                                style={{ padding: "8px 14px", borderRadius: 20, fontSize: 13, cursor: "pointer", border: `1px solid ${isSelected ? m.gold : m.stone}`, backgroundColor: isSelected ? "rgba(186,148,94,0.15)" : m.warmWhite, color: isSelected ? m.darkForest : m.warmGrey }}
                                            >
                                                {isSelected && <Icons.Check size={14} style={{ marginRight: 6, display: "inline", verticalAlign: "middle" }} />}
                                                {isSelected ? s.label.replace("(Morning)", "(Morning Active)") : s.label}
                                            </button>

                                    })}

                            </section>

                            {/* FAMILY & HOUSEHOLD TRANSITIONS */}
                            <section style={{ ...cardStyle, marginBottom: 20 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                                    <Icons.Heart size={20} color={m.terracotta} />
                                    <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: 0 }}>Family & House Transitions</h2>
                                </div>
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                                    <div>
                                        <label style={{ fontSize: 12, color: m.coolGrey, display: "block", marginBottom: 4 }}>Morning Drop-Off</label>
                                        <div style={{ display: "flex", gap: 8 }}>
                                            <button 
                                                onClick={() => updateState({ morningDropoff: "smooth" })}
                                                style={{ flex: 1, padding: 10, borderRadius: 8, border: `1px solid ${state.morningDropoff === "smooth" ? m.forest : m.stone}`, backgroundColor: state.morningDropoff === "smooth" ? "rgba(69,115,93,0.1)" : m.warmWhite, color: m.darkForest, cursor: "pointer" }}
                                            >
                                                Smooth
                                            </button>
                                            <button 
                                                onClick={() => updateState({ morningDropoff: "friction" })}
                                                style={{ flex: 1, padding: 10, borderRadius: 8, border: `1px solid ${state.morningDropoff === "friction" ? m.terracotta : m.stone}`, backgroundColor: state.morningDropoff === "friction" ? "rgba(182,141,118,0.15)" : m.warmWhite, color: m.darkForest, cursor: "pointer" }}
                                            >
                                                Friction
                                            </button>
                                        </div>
                                    </div>
                                    <div>
                                        <label style={{ fontSize: 12, color: m.coolGrey, display: "block", marginBottom: 4 }}>Evening Energy Plan</label>
                                        <select 
                                            value={state.eveningPlan} 
                                            onChange={e => updateState({ eveningPlan: e.target.value })}
                                            style={{ width: "100%", padding: 10, borderRadius: 8, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite, color: m.darkForest, fontSize: 14 }}
                                        >
                                            <option value="cook">Cook Dinner</option>
                                            <option value="takeout">Takeout Plan</option>
                                            <option value="overwhelmed">Sensory Overwhelm / Low Effort</option>
                                        </select>
                                    </div>
                                </div>
                            </section>

                            {/* CORE FOCUS ANCHOR */}
                            <section style={{ ...cardStyle, marginBottom: 20, borderLeft: `4px solid ${m.forest}` }}>
                                <label style={{ fontSize: 12, color: m.coolGrey, display: "block", marginBottom: 6 }}>One Core Focus</label>
                                <input 
                                    type="text" 
                                    value={state.coreFocus} 
                                    onChange={e => updateState({ coreFocus: e.target.value })}
                                    placeholder="If nothing else gets done today, what is the one anchor task?"
                                    style={{ width: "100%", padding: 12, borderRadius: 8, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite, color: m.darkForest, fontSize: 16, outline: "none" }}
                                />
                            </section>

                            {/* MORNING SETUP CHECKLIST */}
                            <section style={{ ...cardStyle, marginBottom: 20 }}>
                                <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: "0 0 12px" }}>Morning Setup Tasks</h2>
                                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                    {morningChecklistTasks.map((task, idx) => (
                                        <label key={idx} style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", padding: 8, borderRadius: 6, backgroundColor: state.morningChecklist[idx] ? "rgba(69,115,93,0.08)" : "transparent", transition: "background 0.2s" }}>
                                            <button onClick={() => toggleMorningTask(idx)} style={{ background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                                                {state.morningChecklist[idx] ? <Icons.CircleCheck size={20} color={m.forest} /> : <Icons.Circle size={20} color={m.stone} />}
                                            </button>
                                            <span style={{ fontSize: 14, color: state.morningChecklist[idx] ? m.forest : m.darkForest, textDecoration: state.morningChecklist[idx] ? "line-through" : "none", opacity: state.morningChecklist[idx] ? 0.7 : 1 }}>
                                                {task}
                                            </span>
                                        </label>
                                    ))}
                                </div>
                            </section>

                            {/* CENTRAL CLIENT DIRECTORY (MANAGE ROSTER) */}
                            <section style={{ ...cardStyle, marginBottom: 20 }}>
                                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                                    <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: 0 }}>Central Client Directory</h2>
                                    <button 
                                        onClick={() => setRosterExpanded(!rosterExpanded)}
                                        style={{ ...btnBaseStyle, padding: "4px 10px", fontSize: 12, border: `1px solid ${m.stone}`, backgroundColor: rosterExpanded ? m.stone : "transparent" }}
                                    >
                                        {rosterExpanded ? "Collapse Manager" : "Manage Directory"}
                                    </button>
                                </div>

                                {rosterExpanded && (
                                    <div style={{ marginBottom: 16, padding: "12px", border: `1px solid ${m.stone}`, borderRadius: 8, backgroundColor: m.warmWhite }}>
                                        <p style={{ fontSize: 12, color: m.coolGrey, marginBottom: 8 }}>Add New Client Baseline</p>
                                        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
                                            <input 
                                                type="text" 
                                                placeholder="Client Initials (e.g. Client X)" 
                                                value={newClientName} 
                                                onChange={e => setNewClientName(e.target.value)}
                                                style={{ flex: 2, padding: "8px 12px", borderRadius: 6, border: `1px solid ${m.stone}`, fontSize: 13, outline: "none" }}
                                            />
                                            <select 
                                                value={newClientWeight} 
                                                onChange={e => setNewClientWeight(Number(e.target.value))}
                                                style={{ flex: 1, padding: "8px", borderRadius: 6, border: `1px solid ${m.stone}`, fontSize: 13, outline: "none" }}
                                            >
                                                <option value={1}>Tier 1 (Low)</option>
                                                <option value={2}>Tier 2 (Mid)</option>
                                                <option value={3}>Tier 3 (High)</option>
                                            </select>
                                            <button 
                                                onClick={addClient}
                                                style={{ ...btnBaseStyle, backgroundColor: m.forest, color: m.warmWhite, padding: "8px 14px", display: "flex", alignItems: "center", gap: 4 }}
                                            >
                                                <Icons.Plus size={14} /> Add
                                            </button>
                                        </div>
                                    </div>
                                )}

                                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 10 }}>
                                    {state.clients.map(client => (
                                        <div key={client.id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 12px", borderRadius: 8, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite }}>
                                            <div>
                                                <span style={{ fontSize: 13, fontWeight: 600, color: m.darkForest }}>{client.name.split(" (")[0]}</span>
