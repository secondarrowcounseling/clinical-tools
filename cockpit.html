                                                    onClick={() => removeClient(client.id)}
                                                    style={{ border: "none", background: "none", cursor: "pointer", color: m.coolGrey }}
                                                    title="Remove Client"
                                                >
                                                    <Icons.Trash2 size={14} />
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </section>

                        </main>
                    )}

                    {/* FLIGHT DECK (PAGE 2) */}
                    {state.page === 2 && (
                        <main style={{ maxWidth: 720, margin: "0 auto", padding: "24px 16px 100px" }}>
                            
                            {/* WEEKEND LAYOUT CARD PLACEHOLDER */}
                            {state.mode === "weekend" && (
                                <div style={{ ...cardStyle, marginBottom: 20, textAlign: "center", padding: 40 }}>
                                    <Icons.Moon size={40} color={m.gold} style={{ margin: "0 auto 12px" }} />
                                    <h2 style={{ ...textHeaderStyle, fontSize: 20, margin: 0 }}>Weekend Mode Active</h2>
                                    <p style={{ color: m.warmGrey, marginTop: 8 }}>
                                        Clinical telemetry is resting. Autonomic restore cycles enabled. Protect your attention from operational loops.
                                    </p>
                                </div>
                            )}

                            {/* AUTONOMIC VARIANCE SCORE */}
                            <section style={{ ...cardStyle, marginBottom: 20, borderTop: `4px solid ${avsFeedback.color}` }}>
                                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                                    <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: 0 }}>Autonomic Variance Score (AVS)</h2>
                                    <span style={{ fontSize: 24, fontWeight: 700, color: avsFeedback.color }}>{state.avs}</span>
                                </div>
                                <input 
                                    type="range" 
                                    min="1" 
                                    max="10" 
                                    value={state.avs} 
                                    onChange={e => updateState({ avs: Number(e.target.value) })}
                                    style={{ width: "100%", accentColor: avsFeedback.color, cursor: "pointer" }}
                                />
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: m.coolGrey, marginTop: 4 }}>
                                    <span>Freeze / Vagal</span>
                                    <span>Ventral / Flow</span>
                                    <span>Sympathetic / Drive</span>
                                </div>
                                <div style={{ marginTop: 12, padding: 12, borderRadius: 8, backgroundColor: avsFeedback.color + "20" }}>
                                    <p style={{ margin: 0, fontSize: 14, fontWeight: 600, color: m.darkForest }}>{avsFeedback.label}</p>
                                    <p style={{ margin: "4px 0 0", fontSize: 12, color: m.warmGrey }}>{avsFeedback.sub}</p>
                                </div>
                            </section>

                            {/* WORKDAY TELEMETRY */}
                            {state.mode === "workday" && (
                                <React.Fragment>
                                    
                                    {/* CLINICIAN UTILIZATION METER */}
                                    <section style={{ ...cardStyle, marginBottom: 20 }}>
                                        <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: "0 0 12px" }}>Daily Clinician Utilization</h2>
                                        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                                            {[1, 2, 3, 4, 5].map(level => {
                                                const uFeedback = getUtilFeedback(level);
                                                const isSelected = state.utilization === level;
                                                return (
                                                    <button
                                                        key={level}
                                                        onClick={() => updateState({ utilization: level })}
                                                        style={{ flex: 1, padding: "10px 4px", borderRadius: 8, cursor: "pointer", border: `2px solid ${isSelected ? uFeedback.color : m.stone}`, backgroundColor: isSelected ? uFeedback.color + "20" : m.warmWhite, color: isSelected ? uFeedback.color : m.warmGrey, fontSize: 12, fontWeight: 600 }}
                                                    >
                                                        {level === 3 && <span style={{ display: "block", marginBottom: 2 }}>⭐</span>}
                                                        {uFeedback.label}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                        <div style={{ height: 8, borderRadius: 4, backgroundColor: m.stone, overflow: "hidden" }}>
                                            <div style={{ width: `${(state.utilization / 5) * 100}%`, height: "100%", backgroundColor: utilFeedback.color, transition: "width 0.3s ease" }}></div>
                                        </div>
                                    </section>

                                    {/* CHRONOLOGICAL SESSION SLOT GRID */}
                                    <section style={{ marginBottom: 20 }}>
                                        <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: "0 0 12px" }}>Daily Telehealth Schedule</h2>
                                        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                                            {state.sessions.map((session, idx) => {
                                                const linkedClient = state.clients.find(c => c.id === session.clientId);
                                                const baseWeight = linkedClient ? linkedClient.weight : 0;
                                                const multiplier = session.intensity === "elevated" ? 1.3 : session.intensity === "crisis" ? 1.6 : 1.0;
                                                const calculatedCCF = session.ghost || !linkedClient ? 0 : baseWeight * multiplier;

                                                let borderHighlight = m.stone;
                                                if (!session.ghost && linkedClient) {
                                                    borderHighlight = baseWeight === 3 ? m.terracotta : baseWeight === 2 ? m.gold : m.forest;
                                                }

                                                return (
                                                    <div key={idx} style={{ ...cardStyle, opacity: session.ghost ? 0.5 : 1, transition: "opacity 0.3s", borderLeft: `4px solid ${borderHighlight}` }}>
                                                        <div style={{ display: "flex", alignItems: "center", justifyValue: "space-between", justifyContent: "space-between", marginBottom: 10 }}>
                                                            <span style={{ fontSize: 14, fontWeight: 700, color: m.darkForest }}>{session.time}</span>
                                                            <button 
                                                                onClick={() => updateSession(idx, { ghost: !session.ghost })}
                                                                style={{ ...btnBaseStyle, backgroundColor: session.ghost ? m.stone : "transparent", color: session.ghost ? m.warmWhite : m.warmGrey, border: `1px solid ${m.stone}`, padding: "6px 12px" }}
                                                                title={session.ghost ? "Restore Session" : "Ghost Session / Late Cancel"}
                                                            >
                                                                <Icons.Ghost size={16} />
                                                            </button>
                                                        </div>

                                                        {!session.ghost ? (
                                                            <React.Fragment>
                                                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
                                                                    <select
                                                                        value={session.clientId}
                                                                        onChange={e => updateSession(idx, { clientId: e.target.value })}
                                                                        style={{ padding: 8, borderRadius: 6, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite, color: m.darkForest, fontSize: 13 }}
                                                                    >
                                                                        <option value="">&mdash; Vacant Session Slot &mdash;</option>
                                                                        {state.clients.map(c => (
                                                                            <option key={c.id} value={c.id}>{c.name.split(" (")[0]} (Tier {c.weight})</option>
                                                                        ))}
                                                                    </select>
                                                                    <select
                                                                        value={session.intensity}
                                                                        onChange={e => updateSession(idx, { intensity: e.target.value })}
                                                                        style={{ padding: 8, borderRadius: 6, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite, color: m.darkForest, fontSize: 13 }}
                                                                    >
                                                                        <option value="standard">Standard Intensity</option>
                                                                        <option value="elevated">Elevated Demand (1.3x)</option>
                                                                        <option value="crisis">Active Crisis (1.6x)</option>
                                                                    </select>
                                                                </div>

                                                                {linkedClient && (
                                                                    <div style={{ fontSize: 11, color: m.coolGrey, marginBottom: 8 }}>
                                                                        Baseline Weight: {baseWeight}.0 &times; {multiplier} = {calculatedCCF.toFixed(1)} CCF Load
                                                                    </div>
                                                                )}

                                                                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                                                                    <button 
                                                                        onClick={() => updateSession(idx, { noteWritten: !session.noteWritten })}
                                                                        style={{ background: "none", border: "none", cursor: "pointer", padding: 0 }}
                                                                    >
                                                                        {session.noteWritten ? <Icons.CircleCheck size={18} color={m.forest} /> : <Icons.Circle size={18} color={m.stone} />}
                                                                    </button>
                                                                    <span style={{ fontSize: 13, color: session.noteWritten ? m.forest : m.darkForest }}>
                                                                        {session.noteWritten ? "Progress Note written" : "EHR Note pending"}
                                                                    </span>
                                                                </label>
                                                            </React.Fragment>
                                                        ) : (
                                                            <p style={{ fontSize: 13, color: m.coolGrey, fontStyle: "italic", margin: 0 }}>
                                                                Late Cancellation / Ghost Active. CCF: 0.0. Professional boundary protected.
                                                            </p>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </section>

                                    {/* CLINICAL COMPLEXITY THERMOMETER */}
                                    <section style={{ ...cardStyle, marginBottom: 20 }}>
                                        <div style={{ display: "flex", alignItems: "center", justifyValue: "space-between", justifyContent: "space-between", marginBottom: 8 }}>
                                            <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: 0 }}>Case Complexity Factor (CCF)</h2>
                                            <span style={{ fontSize: 20, fontWeight: 700, color: ccfColor }}>
                                                {ccfLoad.toFixed(1)} / {dynamicCeiling.toFixed(1)}
                                            </span>
                                        </div>
                                        <div style={{ height: 12, borderRadius: 6, backgroundColor: m.stone, overflow: "hidden", position: "relative" }}>
                                            <div style={{ width: `${ccfPercentage}%`, height: "100%", backgroundColor: ccfColor, transition: "width 0.4s ease" }}></div>
                                            <div style={{ position: "absolute", top: 0, bottom: 0, left: `${(dynamicCeiling / standardCeiling) * 100}%`, width: 2, backgroundColor: m.darkForest, opacity: 0.5 }}></div>
                                        </div>
                                        <div style={{ display: "flex", justifyValue: "space-between", justifyContent: "space-between", fontSize: 11, color: m.coolGrey, marginTop: 4 }}>
                                            <span>0.0</span>
                                            <span style={{ color: m.darkForest, fontWeight: 700 }}>Limit Ceiling: {dynamicCeiling.toFixed(1)}</span>
                                            <span>10.0</span>
                                        </div>
                                        {ccfLoad > dynamicCeiling && (
                                            <div style={{ marginTop: 10, padding: 10, borderRadius: 6, backgroundColor: "rgba(182,141,118,0.15)", color: m.terracotta, fontSize: 13, display: "flex", alignItems: "center", gap: 8 }}>
                                                <Icons.TriangleAlert size={16} />
                                                <span>Workload capacity ceiling breached. Mandating active pacing adjustments.</span>
                                            </div>
                                        )}
                                    </section>

                                    {/* CORE DOCUMENTATION DEBT WIDGET */}
                                    <section style={{ ...cardStyle, marginBottom: 20 }}>
                                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                                            <Icons.FileText size={20} color={unwrittenNotesCount > 0 ? m.terracotta : m.forest} />
                                            <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: 0 }}>Documentation Debt Index</h2>
                                        </div>
                                        {unwrittenNotesCount === 0 ? (
                                            <p style={{ fontSize: 14, color: m.forest, margin: 0 }}>All notes locked. Zero administrative drag.</p>
                                        ) : (
                                            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                                <p style={{ fontSize: 13, color: m.terracotta, margin: 0 }}>
                                                    {unwrittenNotesCount} unwritten progress note{unwrittenNotesCount > 1 ? "s" : ""} remaining:
                                                </p>
                                                {state.sessions.map((s, idx) => !s.clientId || s.ghost || s.noteWritten ? null : (
                                                    <div key={idx} style={{ padding: 10, borderRadius: 6, backgroundColor: "rgba(182,141,118,0.08)", fontSize: 13, display: "flex", justifyValue: "space-between", justifyContent: "space-between", alignItems: "center" }}>
                                                        <div>
                                                            <span style={{ color: m.darkForest, fontWeight: 600 }}>{s.time}</span> &mdash; Client {state.clients.find(c => c.id === s.clientId)?.name.split(" (")[0]}
                                                        </div>
                                                        <button 
                                                            onClick={() => updateSession(idx, { noteWritten: true })}
                                                            style={{ ...btnBaseStyle, padding: "2px 8px", fontSize: 11, backgroundColor: m.forest, color: m.warmWhite }}
                                                        >
                                                            Write Note
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </section>

                                </React.Fragment>
                            )}

                        </main>
                    )}

                    {/* SANDBOX / TRANSITION WORKSPACE (PAGE 3) */}
                    {state.page === 3 && (
                        <main style={{ maxWidth: 720, margin: "0 auto", padding: "24px 16px 100px" }}>
                            
                            {/* AFTERNOON AIRLOCK SHUTDOWN */}
                            <section style={{ ...cardStyle, marginBottom: 20 }}>
                                <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: "0 0 12px" }}>Afternoon Terminal Shutdown</h2>
                                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                    {shutdownChecklistTasks.map((task, idx) => (
                                        <label key={idx} style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", padding: 8, borderRadius: 6, backgroundColor: state.shutdownChecklist[idx] ? "rgba(69,115,93,0.08)" : "transparent", transition: "background 0.2s" }}>
                                            <button onClick={() => toggleShutdownTask(idx)} style={{ background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                                                {state.shutdownChecklist[idx] ? <Icons.CircleCheck size={20} color={m.forest} /> : <Icons.Circle size={20} color={m.stone} />}
                                            </button>
                                            <span style={{ fontSize: 14, color: state.shutdownChecklist[idx] ? m.forest : m.darkForest, textDecoration: state.shutdownChecklist[idx] ? "line-through" : "none", opacity: state.shutdownChecklist[idx] ? 0.7 : 1 }}>
                                                {task}
                                            </span>
                                        </label>
                                    ))}
                                </div>
                                {state.shutdownChecklist.every(Boolean) && (
                                    <div style={{ marginTop: 12, padding: 12, borderRadius: 8, backgroundColor: "rgba(69,115,93,0.1)", color: m.forest, fontSize: 14, textAlign: "center" }}>
                                        <Icons.CircleCheck size={18} style={{ display: "inline", marginRight: 6, verticalAlign: "middle" }} />
                                        Airlock Sealed. Workday securely packaged. Transition home.
                                    </div>
                                )}
                            </section>

                            {/* THE FRICTIONLESS NOTES SCRATCHPAD (AMBIENT SANDBOX) */}
                            {state.mode === "workday" && (
                                <section style={{ ...cardStyle, marginBottom: 20 }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                                        <Icons.FileText size={20} color={m.calmTeal} />
                                        <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: 0 }}>Frictionless Note Scratchpad</h2>
                                    </div>
                                    <p style={{ fontSize: 12, color: m.coolGrey, marginBottom: 8 }}>
                                        Drop unformatted transcripts, raw dictated bullet points, or session insights below before drafting note logs.
                                    </p>
                                    <textarea
                                        value={state.scratchpadNotes}
                                        onChange={e => updateState({ scratchpadNotes: e.target.value })}
                                        placeholder="Pacing notes sandbox..."
                                        style={{ width: "100%", height: 120, padding: 12, borderRadius: 8, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite, color: m.darkForest, fontSize: 13, outline: "none", resize: "vertical", fontFamily: "monospace" }}
                                    />
                                    <div style={{ display: "flex", justifyValue: "space-between", justifyContent: "space-between", marginTop: 8 }}>
                                        <button 
                                            onClick={() => updateState({ scratchpadNotes: "" })}
                                            style={{ ...btnBaseStyle, padding: "6px 12px", fontSize: 12, color: m.terracotta, border: `1px solid ${m.stone}`, backgroundColor: "transparent" }}
                                        >
                                            Clear Sandbox
                                        </button>
                                        <button 
                                            onClick={() => {
                                                const el = document.createElement('textarea');
                                                el.value = state.scratchpadNotes;
                                                document.body.appendChild(el);
                                                el.select();
                                                document.execCommand('copy');
                                                document.body.removeChild(el);
                                                alert("Scratchpad notes copied to local clipboard!");
                                            }}
                                            style={{ ...btnBaseStyle, padding: "6px 12px", fontSize: 12, backgroundColor: m.calmTeal, color: m.warmWhite }}
                                        >
                                            Copy Draft
                                        </button>
                                    </div>
                                </section>
                            )}

                            {/* DAILY SOMATIC TIME CAPSULE MODULE */}
                            <section style={{ ...cardStyle, marginBottom: 20 }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                                    <Icons.Calendar size={20} color={m.gold} />
                                    <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: 0 }}>Daily Somatic Time Capsule</h2>
                                </div>
                                
                                <div style={{ marginBottom: 14 }}>
                                    <div style={{ display: "flex", alignItems: "center", justifyValue: "space-between", justifyContent: "space-between", marginBottom: 4 }}>
                                        <label style={{ fontSize: 12, color: m.coolGrey }}>Day Anchor Hallmark</label>
                                        <button 
                                            onClick={() => updateCapsule({ dayAnchorEnabled: !state.capsule.dayAnchorEnabled })}
                                            style={{ fontSize: 11, padding: "4px 8px", borderRadius: 4, border: `1px solid ${m.stone}`, backgroundColor: state.capsule.dayAnchorEnabled ? m.warmWhite : m.cream, color: m.warmGrey, cursor: "pointer" }}
                                        >
                                            {state.capsule.dayAnchorEnabled ? "Active" : "Resting"}
                                        </button>
                                    </div>
                                    {state.capsule.dayAnchorEnabled ? (
                                        <input 
                                            type="text" 
                                            value={state.capsule.dayAnchor} 
                                            onChange={e => updateCapsule({ dayAnchor: e.target.value })}
                                            placeholder="Standard day routine anchor"
                                            style={{ width: "100%", padding: 10, borderRadius: 6, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite, color: m.darkForest, fontSize: 14 }}
                                        />
                                    ) : (
                                        <p style={{ fontSize: 13, color: m.coolGrey, fontStyle: "italic", margin: 0 }}>Logged as standard_routine_day</p>
                                    )}
                                </div>

                                <div style={{ marginBottom: 14 }}>
                                    <div style={{ display: "flex", alignItems: "center", justifyValue: "space-between", justifyContent: "space-between", marginBottom: 4 }}>
                                        <label style={{ fontSize: 12, color: m.coolGrey }}>Hyperfocus Snippet</label>
                                        <button 
                                            onClick={() => updateCapsule({ hyperfocusEnabled: !state.capsule.hyperfocusEnabled })}
                                            style={{ fontSize: 11, padding: "4px 8px", borderRadius: 4, border: `1px solid ${m.stone}`, backgroundColor: state.capsule.hyperfocusEnabled ? m.warmWhite : m.cream, color: m.warmGrey, cursor: "pointer" }}
                                        >
                                            {state.capsule.hyperfocusEnabled ? "Active" : "Resting"}
                                        </button>
                                    </div>
                                    {state.capsule.hyperfocusEnabled ? (
                                        <input 
                                            type="text" 
                                            value={state.capsule.hyperfocus} 
                                            onChange={e => updateCapsule({ hyperfocus: e.target.value })}
                                            placeholder="Today's cognitive rabbit hole..."
                                            style={{ width: "100%", padding: 10, borderRadius: 6, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite, color: m.darkForest, fontSize: 14 }}
                                        />
                                    ) : (
                                        <p style={{ fontSize: 13, color: m.coolGrey, fontStyle: "italic", margin: 0 }}>Logged as cognitive_rest</p>
                                    )}
                                </div>

                                <div style={{ marginBottom: 14 }}>
                                    <div style={{ display: "flex", alignItems: "center", justifyValue: "space-between", justifyContent: "space-between", marginBottom: 4 }}>
                                        <label style={{ fontSize: 12, color: m.coolGrey, display: "flex", alignItems: "center", gap: 4 }}><Icons.BookOpen size={14} /> Read Shelf</label>
                                        <button 
                                            onClick={() => updateCapsule({ readEnabled: !state.capsule.readEnabled })}
                                            style={{ fontSize: 11, padding: "4px 8px", borderRadius: 4, border: `1px solid ${m.stone}`, backgroundColor: state.capsule.readEnabled ? m.warmWhite : m.cream, color: m.warmGrey, cursor: "pointer" }}
                                        >
                                            {state.capsule.readEnabled ? "Active" : "Resting"}
                                        </button>
                                    </div>
                                    {state.capsule.readEnabled ? (
                                        <input 
                                            type="text" 
                                            value={state.capsule.currentBook} 
                                            onChange={e => updateCapsule({ currentBook: e.target.value })}
                                            placeholder="Active reading material..."
                                            style={{ width: "100%", padding: 10, borderRadius: 6, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite, color: m.darkForest, fontSize: 14 }}
                                        />
                                    ) : (
                                        <p style={{ fontSize: 13, color: m.coolGrey, fontStyle: "italic", margin: 0 }}>Logged as cognitive_rest</p>
                                    )}
                                </div>

                                <div style={{ marginBottom: 14 }}>
                                    <div style={{ display: "flex", alignItems: "center", justifyValue: "space-between", justifyContent: "space-between", marginBottom: 4 }}>
                                        <label style={{ fontSize: 12, color: m.coolGrey, display: "flex", alignItems: "center", gap: 4 }}><Icons.Activity size={14} /> Course Track</label>
                                        <button 
                                            onClick={() => updateCapsule({ courseEnabled: !state.capsule.courseEnabled })}
                                            style={{ fontSize: 11, padding: "4px 8px", borderRadius: 4, border: `1px solid ${m.stone}`, backgroundColor: state.capsule.courseEnabled ? m.warmWhite : m.cream, color: m.warmGrey, cursor: "pointer" }}
                                        >
                                            {state.capsule.courseEnabled ? "Active" : "Resting"}
                                        </button>
                                    </div>
                                    {state.capsule.courseEnabled ? (
                                        <input 
                                            type="text" 
                                            value={state.capsule.activeCourse} 
                                            onChange={e => updateCapsule({ activeCourse: e.target.value })}
                                            placeholder="Active lectures, webinars, CEUs..."
                                            style={{ width: "100%", padding: 10, borderRadius: 6, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite, color: m.darkForest, fontSize: 14 }}
                                        />
                                    ) : (
                                        <p style={{ fontSize: 13, color: m.coolGrey, fontStyle: "italic", margin: 0 }}>Logged as cognitive_rest</p>
                                    )}
                                </div>

                                <div style={{ marginBottom: 14 }}>
                                    <div style={{ display: "flex", alignItems: "center", justifyValue: "space-between", justifyContent: "space-between", marginBottom: 4 }}>
                                        <label style={{ fontSize: 12, color: m.coolGrey, display: "flex", alignItems: "center", gap: 4 }}><Icons.Camera size={14} /> Photo Anchor Link</label>
                                    </div>
                                    <input 
                                        type="text" 
                                        value={state.capsule.photoAnchor} 
                                        onChange={e => updateCapsule({ photoAnchor: e.target.value })}
                                        placeholder="e.g. [[Upload/Drop Zone: daily_pic.jpg]]"
                                        style={{ width: "100%", padding: 10, borderRadius: 6, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite, color: m.darkForest, fontSize: 14 }}
                                    />
                                </div>

                                <div style={{ marginBottom: 8 }}>
                                    <div style={{ display: "flex", alignItems: "center", justifyValue: "space-between", justifyContent: "space-between", marginBottom: 4 }}>
                                        <label style={{ fontSize: 12, color: m.coolGrey }}>Media Loop / Noise</label>
                                        <button 
                                            onClick={() => updateCapsule({ mediaEnabled: !state.capsule.mediaEnabled })}
                                            style={{ fontSize: 11, padding: "4px 8px", borderRadius: 4, border: `1px solid ${m.stone}`, backgroundColor: state.capsule.mediaEnabled ? m.warmWhite : m.cream, color: m.warmGrey, cursor: "pointer" }}
                                        >
                                            {state.capsule.mediaEnabled ? "Active" : "Resting"}
                                        </button>
                                    </div>
                                    {state.capsule.mediaEnabled ? (
                                        <input 
                                            type="text" 
                                            value={state.capsule.media} 
                                            onChange={e => updateCapsule({ media: e.target.value })}
                                            placeholder="White noise, specific loops, etc."
                                            style={{ width: "100%", padding: 10, borderRadius: 6, border: `1px solid ${m.stone}`, backgroundColor: m.warmWhite, color: m.darkForest, fontSize: 14 }}
                                        />
                                    ) : (
                                        <p style={{ fontSize: 13, color: m.coolGrey, fontStyle: "italic", margin: 0 }}>Logged as intentional_silence</p>
                                    )}
                                </div>
                            </section>

                            {/* OBSIDIAN YAML LOGGER EXPORT */}
                            <section style={{ ...cardStyle, marginBottom: 20 }}>
                                <div style={{ display: "flex", alignItems: "center", justifyValue: "space-between", justifyContent: "space-between", Richmond: "space-between", marginBottom: 12 }}>
                                    <h2 style={{ ...textHeaderStyle, fontSize: 18, margin: 0 }}>Export YAML Log</h2>
                                    <button 
                                        onClick={handleCopy}
                                        style={{ ...btnBaseStyle, backgroundColor: copied ? m.forest : m.darkForest, color: m.warmWhite, display: "flex", alignItems: "center", gap: 6 }}
                                    >
                                        {copied ? <Icons.Check size={16} /> : <Icons.Copy size={16} />}
                                        {copied ? "Copied!" : "Copy YAML"}
                                    </button>
                                </div>
                                <pre style={{ backgroundColor: m.warmWhite, border: `1px solid ${m.stone}`, borderRadius: 8, padding: 16, fontSize: 12, color: m.darkForest, overflowX: "auto", whiteSpace: "pre-wrap", wordBreak: "break-all" }}>
                                    {compiledMarkdown}
                                </pre>
                            </section>

                        </main>
                    )}

                    {/* FIXED NAVIGATION INTERFACE */}
                    <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, backgroundColor: m.cream, borderTop: `1px solid ${m.stone}`, padding:"12px 16px", display: "flex", justifyContent: "center", gap: 12, zIndex: 50 }}>
                        <button onClick={() => updateState({ page: 1 })} style={pageSelectorStyle(state.page === 1)}>
                            <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                <Icons.ChevronLeft size={16} /> Launchpad
                            </span>
                        </button>
                        <button onClick={() => updateState({ page: 2 })} style={pageSelectorStyle(state.page === 2)}>
                            <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                <Icons.Activity size={16} /> Flight Deck
                            </span>
                        </button>
                        <button onClick={() => updateState({ page: 3 })} style={pageSelectorStyle(state.page === 3)}>
                            <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                                Sandbox / Terminal <Icons.ChevronRight size={16} />
                            </span>
                        </button>
                    </nav>

                </div>
            );
        }

        const container = document.getElementById("root");
        if (container) {
            ReactDOM.createRoot(container).render(
                <ErrorBoundary>
                    <App />
                </ErrorBoundary>
            );
        } else {
            document.body.innerHTML = '<div style="padding:40px; color:red;">Missing Root Mount Element</div>';
        }
    </script>
</body>
</html>
